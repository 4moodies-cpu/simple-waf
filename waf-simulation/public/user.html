<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Сайт проекту</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 100px; background: #f4f6f9; }
        .card { background: white; padding: 40px; display: inline-block; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; }
        .success { color: #2ecc71; }
        .danger { color: #e74c3c; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background: #3498db; color: white; }
    </style>
</head>
<body>
    <div class="card" id="app">
        <h2>Перевірка доступу до сайту...</h2>
    </div>

    <script>
        async function checkAccess() {
            const res = await fetch('/api/check-access');
            const data = await res.json();
            const app = document.getElementById('app');

            if (data.blocked) {
                app.innerHTML = `
                    <h1 class="danger">🛑 ДОСТУП ЗАБЛОКОВАНО!</h1>
                    <p><strong>WAF Фаєрвол захистив сайт.</strong></p>
                    <p style="color: #555;">Причина блокування: ${data.reason}</p>
                    <hr>
                    <small>Твій цифровий відбиток: ${JSON.stringify(data.details)}</small>
                    <br><br><button onclick="checkAccess()">Спробувати знову</button>
                `;
                document.body.style.background = "#fce4e4";
            } else {
                app.innerHTML = `
                    <h1 class="success">🎉 Ласкаво просимо!</h1>
                    <p>Доступ дозволено. WAF вважає ваш запит безпечним.</p>
                    <hr>
                    <p>Адмін бачить твої параметри: <strong>Бравзер:</strong> ${data.details.browser}, <strong>IP:</strong> ${data.details.ip}</p>
                    <button onclick="checkAccess()">Оновити сторінку</button>
                `;
                document.body.style.background = "#e8f8f5";
            }
        }
        checkAccess();
    </script>
</body>
</html>
