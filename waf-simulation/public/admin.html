<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>WAF Admin Console</title>
    <style>
        body { font-family: monospace; background: #1e1e24; color: #fff; padding: 20px; }
        .container { display: flex; gap: 20px; }
        .box { flex: 1; background: #2a2a35; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { color: #00ff66; border-bottom: 1px solid #444; padding-bottom: 10px; }
        label { display: block; margin: 10px 0 5px; color: #bbb; }
        input, select { width: 90%; padding: 8px; background: #3a3a4a; border: 1px solid #555; color: white; font-family: monospace; }
        button { background: #00ff66; color: black; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; }
        button:hover { background: #00cc52; }
        .log-item { background: #1e1e24; padding: 10px; border-left: 4px solid #3498db; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🛡️ Консоль керування Web Application Firewall (WAF)</h1>
    
    <div class="container">
        <!-- Блок налаштування правил -->
        <div class="box">
            <h2>Критерії блокування (Правила)</h2>
            <p><small>Заповніть поле, щоб заблокувати відвідувача з такими параметрами:</small></p>
            
            <label>Блокувати IP адресу:</label>
            <input type="text" id="ruleIp" placeholder="Наприклад: 127.0.0.1">

            <label>Блокувати Бравзер:</label>
            <select id="ruleBrowser">
                <option value="">-- Не блокувати --</option>
                <option value="Chrome">Chrome</option>
                <option value="Firefox">Firefox</option>
                <option value="Safari">Safari</option>
            </select>

            <label>Блокувати код мови системи (Accept-Language):</label>
            <input type="text" id="ruleLanguage" placeholder="Наприклад: en, uk">

            <label>Блокувати Країну (імітація за мовою):</label>
            <input type="text" id="ruleCountry" placeholder="Наприклад: США або Україна">

            <label>Блокувати HTTP Метод:</label>
            <input type="text" id="ruleMethod" placeholder="GET або POST">

            <button onclick="saveRules()">Застосувати правила WAF</button>
        </div>

        <!-- Блок моніторингу користувачів -->
        <div class="box">
            <h2>Аналізатор трафіку (Останній запит)</h2>
            <div id="visitorLog">
                <p>Очікування відвідувачів...</p>
            </div>
            <button onclick="loadStatus()" style="background:#3498db; color:white;">Оновити моніторинг</button>
        </div>
    </div>

    <script>
        async function loadStatus() {
            const res = await fetch('/api/admin/status');
            const data = await res.json();
            
            // Заповнюємо логи користувача
            const logBox = document.getElementById('visitorLog');
            logBox.innerHTML = `
                <div class="log-item"><strong>IP:</strong> ${data.lastVisitor.ip}</div>
                <div class="log-item"><strong>Бравзер:</strong> ${data.lastVisitor.browser}</div>
                <div class="log-item"><strong>Мова:</strong> ${data.lastVisitor.language}</div>
                <div class="log-item"><strong>Країна:</strong> ${data.lastVisitor.country}</div>
                <div class="log-item"><strong>Метод запиту:</strong> ${data.lastVisitor.method}</div>
            `;
        }

        async function saveRules() {
            const rules = {
                ip: document.getElementById('ruleIp').value,
                browser: document.getElementById('ruleBrowser').value,
                language: document.getElementById('ruleLanguage').value,
                country: document.getElementById('ruleCountry').value,
                method: document.getElementById('ruleMethod').value
            };

            const res = await fetch('/api/admin/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(rules)
            });
            const data = await res.json();
            alert(data.message);
            loadStatus();
        }

        // Автооновлення кожні 3 секунди, щоб бачити заходи учнів
        setInterval(loadStatus, 3000);
        loadStatus();
    </script>
</body>
</html>
